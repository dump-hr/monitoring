---
- name: Create postgres-exporter docker container
  docker_container:
    name: rds-exporter
    image: quay.io/prometheuscommunity/postgres-exporter:v0.19.0
    pull: yes
    restart_policy: unless-stopped
    network_mode: host
    read_only: true
    env:
      DATA_SOURCE_NAME: "postgres://postgres_exporter:{{ postgres_exporter_password }}@dump-pg.cdfmqjrt88ru.eu-central-1.rds.amazonaws.com:5432/postgres?sslmode=require"
