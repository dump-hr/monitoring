---
- name: Install WireGuard
  apt:
    name: wireguard
    state: present
    update_cache: true

- name: Enable IPv4 forwarding
  sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: true
    state: present
    reload: true

- name: Generate WireGuard server keys
  shell: wg genkey | tee /etc/wireguard/server_private.key | wg pubkey > /etc/wireguard/server_public.key
  args:
    creates: /etc/wireguard/server_private.key

- name: Restrict permissions on server private key
  file:
    path: /etc/wireguard/server_private.key
    owner: root
    group: root
    mode: '0600'

- name: Read server private key
  slurp:
    src: /etc/wireguard/server_private.key
  register: wg_server_private_key

- name: Render wg0.conf
  template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    owner: root
    group: root
    mode: '0600'
  notify: Restart wireguard

- name: Enable and start wg-quick@wg0
  systemd:
    name: wg-quick@wg0
    enabled: true
    state: started
